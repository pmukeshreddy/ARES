# ═══════════════════════════════════════════════════════
# RLCR v2 Configuration
# ═══════════════════════════════════════════════════════

# ─── Data ─────────────────────────────────────────────
data:
  # CodeReviewer dataset (Zenodo)
  codereviewer_url: "https://zenodo.org/records/6900648/files/Code_Refinement.zip"
  codereviewer_comment_url: "https://zenodo.org/records/6900648/files/Comment_Generation.zip"
  
  # ronantakizawa dataset (HuggingFace) - for Phase 2 team simulation
  hf_dataset: "ronantakizawa/github-codereview"
  
  # Paths (relative to project root)
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  embeddings_dir: "data/embeddings"
  
  # Filtering
  min_comment_words: 3            # Remove comments with fewer words
  max_diff_tokens: 2048           # Remove diffs exceeding this token count
  max_input_tokens: 1024          # Truncate model input to this length
  remove_bots: true
  remove_non_english: true
  
  # Splits
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1
  seed: 42

# ─── Reward Model (Phase 1) ──────────────────────────
reward_model:
  # Base model
  model_name: "Qwen/Qwen2.5-Coder-1.5B"   # Or "Qwen/Qwen2.5-Coder-7B"
  
  # LoRA config
  lora_r: 32
  lora_alpha: 64
  lora_dropout: 0.05
  lora_target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
  
  # Classification head
  hidden_dim: 256                 # Intermediate dim before sigmoid
  dropout: 0.1
  
  # Training
  batch_size: 16
  gradient_accumulation_steps: 2
  learning_rate: 2.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.05
  num_epochs: 1
  max_grad_norm: 1.0
  fp16: false
  bf16: true                      # Use bf16 on A100/H100
  
  # Validation
  eval_steps: 500                 # Evaluate every N steps
  auroc_target: 0.70              # Minimum acceptable AUROC
  auroc_warning: 0.65             # Warn if AUROC drops below
  
  # Checkpointing
  output_dir: "checkpoints/reward_model"
  save_best_only: true
  
  # Logging
  log_steps: 50
  use_wandb: false
  wandb_project: "rlcr-v2"

# ─── Embeddings ──────────────────────────────────────
embeddings:
  model_name: "sentence-transformers/all-MiniLM-L6-v2"
  batch_size: 256
  output_file: "data/embeddings/comment_embeddings.npy"
  ids_file: "data/embeddings/comment_ids.json"

# ─── Phase 2 DAPO ───────────
dapo:
  model_name: "Qwen/Qwen2.5-Coder-3B-Instruct"
  output_dir: "checkpoints/dapo"
  precomputed_scores_path: "data/precomputed_rm_scores.json"
  unlabeled_data_path: "data/unlabeled_pairs.json"
  
  # LoRA
  lora_r: 16
  lora_alpha: 32
  lora_target_modules: ["q_proj", "k_proj", "v_proj", "o_proj"]
  lora_dropout: 0.05
  
  # Training
  batch_size: 8          # 8 prompts × 8 completions = 64 (same as before, less noise)
  grad_accum_steps: 4    # Accumulate over 4 batches → 32 prompts per update
  learning_rate: 2.0e-5
  max_steps: 50
  lora_sync_interval: 1  # Sync to SGLang every step
  
  # GRPO
  group_size: 8          # 8 rollouts per prompt for stable reward signal
  clip_ratio_low: 0.15
  clip_ratio_high: 0.20
  dynamic_sampling: true
  token_level_loss: true
  kl_penalty: 0.05
  entropy_bonus: 0.01    # Token-level entropy bonus to prevent policy collapse
  temperature: 0.8       # Generation temperature (was 1.0, lowered to reduce invalid format)
  decision_token_boost: 1.0  # Just exempt from mask, no extra boost
  max_new_tokens: 256
  
  # Reward Weights
  r1_weight: 0.10      # Reasoning quality
  r2_weight: 0.70      # Outcome match (team labels)
  r3_weight: 0.00      # RM Agreement (dead — IDs mismatched, all scores missing)
  r4_weight: 0.10      # Format compliance
  r5_weight: 0.10      # Overlong penalty
  
  # R2 configuration
  r2_false_positive_penalty: -1.0
  r2_false_negative_penalty: -1.0
